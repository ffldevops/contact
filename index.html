<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franck Fleureau – Product Owner</title>

    <style>
        /* 🎨 PALETTE PRODUCT OWNER CORPORATE */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #1f2937);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* ✔ centrage vertical parfait */
            padding: 20px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f172a, #1e293b);
            }
        }

        /* ✔ Carte centrée et équilibrée */
        .card {
            background: rgba(255, 255, 255, 0.35); /* ✔ plus pro, moins blanc */
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 18px;
            text-align: center;
            width: 360px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            border: 1px solid rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        .logo {
            width: 110px;
            height: 110px;
            background: #fff;
            color: #5a2ea6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            margin: 0 auto 20px auto;
        }

        h1 {
            margin: 10px 0 0 0;
            font-size: 26px;
            font-weight: bold;
            color: #2d3748; /* ✔ meilleur équilibre visuel */
        }

        h2 {
            margin: 5px 0 20px 0;
            font-size: 16px;
            font-weight: normal;
            opacity: 0.9;
            color: #2d3748;
        }

        .contact {
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.6;
            color: #2d3748;
        }

        /* ✔ Boutons parfaitement centrés */
        .btn {
            display: block;
            width: 100%; /* ✔ largeur propre */
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            box-sizing: border-box; /* ✔ corrige le décalage */
        }

        .btn-primary {
            background: #5a2ea6;
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .btn-outline {
            border: 2px solid #2d3748;
            color: #2d3748;
        }

        .btn-outline:hover {
            background: rgba(0,0,0,0.08);
        }
    </style>
</head>
