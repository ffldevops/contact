    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5; /* ✔ clair, lisible, pro */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* ✔ centrage parfait */
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9); /* ✔ très clair, mobile-friendly */
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 18px;
            text-align: center;
            width: 360px;
            max-width: 90vw; /* ✔ mobile */
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .logo {
            width: 110px;
            height: 110px;
            background: #5a2ea6; /* ✔ violet original */
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            margin: 0 auto 20px auto;
        }

        h1 {
            margin: 10px 0 0 0;
            font-size: 26px;
            font-weight: bold;
            color: #5a2ea6;
        }

        h2 {
            margin: 5px 0 20px 0;
            font-size: 16px;
            font-weight: normal;
            opacity: 0.8;
        }

        .contact {
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.6;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; /* ✔ espace icône + texte */
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            box-sizing: border-box; /* ✔ centrage parfait */
        }

        .btn-primary {
            background: #5a2ea6;
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .btn-outline {
            border: 2px solid #5a2ea6;
            color: #5a2ea6;
        }

        .btn-outline:hover {
            background: rgba(90,46,166,0.1);
        }
    </style>
</head>
